const state = {
  answers: new Array(QUESTIONS.length).fill(null),
  score: 0,
  answered: 0
};

const quizEl = document.getElementById('quiz');
const scoreEl = document.getElementById('score');
const counterEl = document.getElementById('counter');
const progressFill = document.getElementById('progressFill');
const resetBtn = document.getElementById('resetBtn');

function render() {
  quizEl.innerHTML = '';
  QUESTIONS.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'question';
    card.id = `q${qi}`;

    const num = document.createElement('div');
    num.className = 'q-num';
    num.textContent = `Հարց ${qi + 1} / Вопрос ${qi + 1}`;
    card.appendChild(num);

    const hy = document.createElement('div');
    hy.className = 'q-hy';
    hy.textContent = q.hy;
    card.appendChild(hy);

    const ru = document.createElement('div');
    ru.className = 'q-ru';
    ru.textContent = q.ru;
    card.appendChild(ru);

    const opts = document.createElement('div');
    opts.className = 'options';

    const userAnswer = state.answers[qi];

    q.options.forEach((opt, oi) => {
      const btn = document.createElement('button');
      btn.className = 'option';
      btn.type = 'button';

      const hySpan = document.createElement('span');
      hySpan.className = 'opt-hy';
      hySpan.textContent = `${oi + 1}) ${opt.hy}`;
      btn.appendChild(hySpan);

      const ruSpan = document.createElement('span');
      ruSpan.className = 'opt-ru';
      ruSpan.textContent = opt.ru;
      btn.appendChild(ruSpan);

      if (userAnswer !== null) {
        btn.disabled = true;
        if (oi === q.correct) {
          btn.classList.add('correct');
        } else if (oi === userAnswer) {
          btn.classList.add('wrong');
        } else {
          btn.classList.add('muted');
        }
      }

      btn.addEventListener('click', () => answer(qi, oi));
      opts.appendChild(btn);
    });

    card.appendChild(opts);

    if (userAnswer !== null) {
      const fb = document.createElement('div');
      fb.className = 'feedback show ' + (userAnswer === q.correct ? 'ok' : 'err');
      fb.textContent = userAnswer === q.correct
        ? 'Ճիշտ է / Правильно'
        : `Սխալ / Неправильно. Ճիշտ պատասխան՝ ${q.correct + 1}) ${q.options[q.correct].hy}`;
      card.appendChild(fb);
    }

    quizEl.appendChild(card);
  });

  updateProgress();
}

function answer(qi, oi) {
  if (state.answers[qi] !== null) return;
  state.answers[qi] = oi;
  if (oi === QUESTIONS[qi].correct) state.score++;
  state.answered++;
  render();

  if (state.answered === QUESTIONS.length) {
    showSummary();
  } else {
    const next = document.getElementById(`q${qi + 1}`);
    if (next) {
      setTimeout(() => next.scrollIntoView({ behavior: 'smooth', block: 'start' }), 200);
    }
  }
}

function updateProgress() {
  scoreEl.textContent = `${state.score} / ${state.answered}`;
  counterEl.textContent = `${state.answered} / ${QUESTIONS.length}`;
  progressFill.style.width = `${(state.answered / QUESTIONS.length) * 100}%`;
}

function showSummary() {
  const existing = document.getElementById('summary');
  if (existing) existing.remove();
  const div = document.createElement('div');
  div.className = 'summary';
  div.id = 'summary';
  const passed = state.score >= 17;
  div.innerHTML = `
    <h2>Արդյունք / Результат</h2>
    <div class="result">${state.score} / ${QUESTIONS.length}</div>
    <div class="${passed ? 'pass' : 'fail'}">
      ${passed
        ? '✓ Անցել եք թեստը / Тест пройден'
        : '✗ Չեք անցել թեստը / Тест не пройден'}
    </div>
    <div class="note">Անցողիկ շեմը՝ կեսից ավելի (17 և ավելի)<br/>Проходной балл — больше половины (17 и более)</div>
  `;
  quizEl.appendChild(div);
  setTimeout(() => div.scrollIntoView({ behavior: 'smooth', block: 'start' }), 200);
}

resetBtn.addEventListener('click', () => {
  if (state.answered === 0 || confirm('Սկսել նորից? / Начать заново?')) {
    state.answers = new Array(QUESTIONS.length).fill(null);
    state.score = 0;
    state.answered = 0;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
});
